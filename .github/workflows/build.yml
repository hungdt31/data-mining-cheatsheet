name: Build & Publish LaTeX PDFs

on:
  push:
    branches: [main]
    paths:
      - "chapters/**"
      - "index.html"
      - "assets/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Pages + đọc artifacts giữa các job
permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: compile each chapter in parallel
  # ────────────────────────────────────────────────────────────
  build:
    name: Compile ${{ matrix.chapter }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chapter: [C1, C2, C3, C4, C5, C6]
      fail-fast: false   # compile remaining chapters even if one fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # latex-action@v3: mặc định compiler=latexmk, args có -pdf → đã dùng pdflatex.
      # Không dùng latexmk_use_pdflatex (input đã bỏ ở v3).
      - name: Compile ${{ matrix.chapter }}/main.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: chapters/${{ matrix.chapter }}
          root_file: main.tex
          extra_system_packages: "py-pygments"
        env:
          # Thư mục cha chapters/ (chứa _preamble.tex, _title.tex). Chỉ dùng "..//:" —
          # không nối $TEXINPUTS (tránh kpathsea: TEXINPUTS references itself trong Docker).
          TEXINPUTS: "..//:"
        continue-on-error: true

      - name: Stage PDF theo tên chương
        run: |
          mkdir -p .ci-pdfs
          pdf_path="chapters/${{ matrix.chapter }}/main.pdf"
          if [ -f "$pdf_path" ]; then
            cp "$pdf_path" ".ci-pdfs/${{ matrix.chapter }}.pdf"
            echo "OK: .ci-pdfs/${{ matrix.chapter }}.pdf"
          else
            echo "SKIP: không có $pdf_path"
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ matrix.chapter }}
          path: .ci-pdfs/${{ matrix.chapter }}.pdf
          if-no-files-found: ignore
          retention-days: 7

      - name: Cài Pandoc và latexpand (trang HTML chương)
        run: sudo apt-get update -qq && sudo apt-get install -y pandoc texlive-extra-utils

      - name: Sinh HTML chương từ LaTeX
        run: python3 scripts/build_chapter_html.py ${{ matrix.chapter }}

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-${{ matrix.chapter }}
          path: .ci-html/${{ matrix.chapter }}.html
          if-no-files-found: ignore
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: assemble and deploy to GitHub Pages
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tải artifact PDF
        uses: actions/download-artifact@v4
        with:
          pattern: pdf-*
          path: artifacts
          merge-multiple: false

      - name: Tải artifact HTML
        uses: actions/download-artifact@v4
        with:
          pattern: html-*
          path: artifacts-html
          merge-multiple: false

      - name: Debug — file trong artifacts
        run: |
          find artifacts -type f 2>/dev/null | sort || true
          find artifacts-html -type f 2>/dev/null | sort || true

      - name: Gom PDF, HTML và stylesheet vào dist
        run: |
          mkdir -p dist/chapters
          cp assets/chapters.css dist/chapters/chapters.css
          for chapter in C1 C2 C3 C4 C5 C6; do
            lower=$(echo "$chapter" | tr '[:upper:]' '[:lower:]')
            src_pdf="artifacts/pdf-${chapter}/${chapter}.pdf"
            if [ -f "$src_pdf" ]; then
              cp "$src_pdf" "dist/chapters/${lower}.pdf"
              echo "✓ PDF ${chapter} → chapters/${lower}.pdf"
            else
              echo "✗ PDF ${chapter} skipped"
            fi
            src_html="artifacts-html/html-${chapter}/${chapter}.html"
            if [ -f "$src_html" ]; then
              cp "$src_html" "dist/chapters/${lower}.html"
              echo "✓ HTML ${chapter} → chapters/${lower}.html"
            else
              echo "✗ HTML ${chapter} skipped"
            fi
          done

      - name: Sinh trang mục lục (index)
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: python3 scripts/render_index.py

      # Bật Pages qua API nếu repo chưa có (cần permissions: pages: write).
      # Nếu vẫn lỗi: Settings → Pages → Source = GitHub Actions (bật thủ công).
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
