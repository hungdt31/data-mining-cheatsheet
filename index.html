<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khai Phá Dữ Liệu – Tài liệu ôn tập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Giấy in, mực, nhấn editorial */
      --paper: #efebe3;
      --paper-elevated: #f7f4ee;
      --ink: #1c1c1c;
      --ink-muted: #5c5a54;
      --rule: #1c1c1c;
      --accent: #722f37;
      --accent-hover: #4a1f24;
    }

    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Viền trên masthead kiểu ấn phẩm */
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
      border-top: 3px double var(--rule);
    }

    header.masthead {
      padding: 3.25rem 0 2.5rem;
      border-bottom: 1px solid var(--rule);
      text-align: center;
    }

    .masthead-kicker {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1.25rem;
    }

    .masthead h1 {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      font-optical-sizing: auto;
      letter-spacing: -0.02em;
      line-height: 1.12;
      color: var(--ink);
    }

    .masthead-deck {
      font-family: "Newsreader", Georgia, serif;
      font-size: 1.125rem;
      font-style: italic;
      font-weight: 400;
      color: var(--ink-muted);
      max-width: 34ch;
      margin: 1.35rem auto 0;
      line-height: 1.55;
    }

    main {
      padding-top: 2.75rem;
    }

    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 1.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
      .card:nth-child(odd) {
        border-right: 1px solid rgba(28, 28, 28, 0.12);
        padding-right: 1.75rem;
      }
      .card:nth-child(even) {
        padding-left: 1.75rem;
      }
    }

    .card {
      background: transparent;
      padding: 1.75rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      border-bottom: 1px solid rgba(28, 28, 28, 0.1);
      transition: opacity 0.2s ease;
    }

    .card:hover {
      opacity: 0.92;
    }

    .card-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-left: 2px solid var(--accent);
      padding-left: 0.65rem;
      width: fit-content;
    }

    .card-title {
      font-family: "Newsreader", Georgia, serif;
      font-size: 1.1875rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
    }

    .card-actions {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      align-items: center;
    }

    .card-link { display: inline-block; }

    .card-link--pdf::after {
      content: " →";
      font-weight: 500;
    }

    .card-link--web::after {
      content: " →";
      font-weight: 500;
    }

    .card-link {
      margin-top: 0;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent);
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .card-link:hover {
      color: var(--accent-hover);
      border-bottom-color: var(--accent-hover);
    }

    footer {
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
    }

    footer a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(28, 28, 28, 0.35);
      transition: border-color 0.15s ease;
    }

    footer a:hover {
      border-bottom-color: var(--ink);
    }

    .empty-state {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      color: var(--ink-muted);
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <p class="masthead-kicker">Tài liệu ôn tập</p>
      <h1>Khai phá dữ liệu</h1>
      <p class="masthead-deck">Tổng hợp kiến thức, câu hỏi tự luận và trắc nghiệm theo từng chương.</p>
    </header>

    <main>
      <p class="section-label">Mục lục</p>
      <div class="grid" id="cards"></div>
    </main>

    <footer>
      GitHub Actions ·
      <a href="https://github.com/__GITHUB_REPOSITORY__">Mã nguồn</a>
    </footer>
  </div>

  <script>
    const meta = {
      C1: { title: "Giới thiệu về Khai Phá Dữ Liệu" },
      C2: { title: "Tiền Xử Lý Dữ Liệu" },
      C3: { title: "Hồi Quy và Dự Đoán (Regression)" },
      C4: { title: "Phân Lớp Dữ Liệu (Classification)" },
      C5: { title: "Phân Cụm Dữ Liệu (Clustering)" },
      C6: { title: "Luật Kết Hợp và Thuật Toán Apriori" },
    };
    const available = __CHAPTERS_JSON__;
    const grid = document.getElementById("cards");
    const chapterNum = (id) => String(id.replace("C", "")).padStart(2, "0");

    available.forEach((entry) => {
      const ch = entry.id;
      const info = meta[ch] || { title: ch };
      const lower = ch.toLowerCase();
      const links = [];
      if (entry.html)
        links.push(
          `<a class="card-link card-link--web" href="chapters/${lower}.html">Trên web</a>`
        );
      if (entry.pdf)
        links.push(
          `<a class="card-link card-link--pdf" href="chapters/${lower}.pdf" target="_blank" rel="noopener noreferrer">PDF</a>`
        );
      const actions =
        links.length > 0
          ? `<div class="card-actions">${links.join("")}</div>`
          : "";
      grid.innerHTML += `
        <article class="card">
          <span class="card-badge">Chương ${chapterNum(ch)}</span>
          <div class="card-title">${info.title}</div>
          ${actions}
        </article>`;
    });
    if (available.length === 0)
      grid.innerHTML = '<p class="empty-state">Chưa có chương nào được biên dịch.</p>';
  </script>
</body>
</html>
