<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__CHAPTER_LABEL__ · __TITLE__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chapters.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"], ["$$", "$$"]],
      },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body class="chapter-page">
  <div class="chapter-shell">
    <nav class="chapter-nav" aria-label="Điều hướng">
      <a class="chapter-nav__back" href="../index.html">← Tất cả chương</a>
      <a class="chapter-nav__pdf" href="__PDF_HREF__" target="_blank" rel="noopener">Bản PDF</a>
    </nav>

    <header class="chapter-masthead">
      <p class="chapter-masthead__kicker">__CHAPTER_LABEL__</p>
      <h1 class="chapter-masthead__title">__TITLE__</h1>
    </header>

    <!-- prose trước để mobile không bị TOC chặn -->
    <div class="chapter-layout">
      <article class="chapter-prose" id="chapter-prose">
__BODY__
      </article>

      <!-- TOC: <details> trên mobile/tablet, luôn mở trên desktop qua JS -->
      <aside class="chapter-toc-panel" id="chapter-toc-panel" hidden>
        <details class="chapter-toc__details" id="chapter-toc-details">
          <summary class="chapter-toc__summary">Mục lục</summary>
          <nav id="chapter-toc-nav" aria-label="Mục lục trong chương">
            <div id="chapter-toc-list"></div>
          </nav>
        </details>
      </aside>
    </div>

    <footer class="chapter-footer">
      <a href="../index.html">Danh sách chương</a>
      <span class="chapter-footer__sep">·</span>
      <a href="__PDF_HREF__" target="_blank" rel="noopener">Tải PDF</a>
    </footer>
  </div>

  <script>
    (function () {
      var DESKTOP_BP = 1024;

      /* ── Đảm bảo mọi heading đều có id duy nhất ── */
      function ensureHeadingIds(headings) {
        var used = {};
        for (var i = 0; i < headings.length; i++) {
          var h = headings[i];
          var raw = h.id && String(h.id).trim();
          if (raw && !used[raw]) { used[raw] = true; continue; }
          var nid = "ch-sec-" + i;
          h.id = nid;
          used[nid] = true;
        }
      }

      /* ── Dựng cây <ol> lồng nhau từ danh sách heading ── */
      function buildTocTree(headings) {
        var list = Array.prototype.slice.call(headings);
        var i = 0;
        function walk(minLv) {
          var ol = document.createElement("ol");
          ol.className = "chapter-toc__tree";
          while (i < list.length) {
            var h = list[i];
            var lv = parseInt(h.tagName.slice(1), 10);
            if (lv < minLv) break;
            var li = document.createElement("li");
            var a  = document.createElement("a");
            a.href = "#" + h.id;
            a.textContent = h.textContent.trim();
            li.appendChild(a);
            i++;
            if (i < list.length && parseInt(list[i].tagName.slice(1), 10) > lv) {
              li.appendChild(walk(lv + 1));
            }
            ol.appendChild(li);
          }
          return ol;
        }
        var root = walk(1);
        return root.children.length ? root : null;
      }

      /* ── Mở/đóng details theo breakpoint ── */
      function syncDetails() {
        var details = document.getElementById("chapter-toc-details");
        if (!details) return;
        if (window.innerWidth >= DESKTOP_BP) {
          details.setAttribute("open", "");
        }
        /* Trên mobile: không ép đóng, để người dùng tự mở */
      }

      /* ── Khởi tạo ── */
      function init() {
        var prose  = document.getElementById("chapter-prose");
        var panel  = document.getElementById("chapter-toc-panel");
        var mount  = document.getElementById("chapter-toc-list");
        if (!prose || !panel || !mount) return;

        var headings = prose.querySelectorAll("h1, h2, h3, h4");
        if (!headings.length) return;

        ensureHeadingIds(headings);
        var tree = buildTocTree(headings);
        if (!tree) return;

        mount.appendChild(tree);
        panel.hidden = false;
        syncDetails();
      }

      /* Đồng bộ khi resize (e.g. xoay thiết bị, thay đổi cửa sổ) */
      var resizeTimer;
      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(syncDetails, 120);
      });

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
